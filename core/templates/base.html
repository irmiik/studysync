<!DOCTYPE html>
<html>
<head>
    <title>StudySync</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: linear-gradient(135deg, #89f7fe, #66a6ff, #c2e9fb);
        min-height: 100vh;
    }
    </style>
</head>

<body>

<!-- 🔥 TEK ANA KART -->
<div class="container mt-4 p-4" style="
    background-color: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    min-height: 80vh;
">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">StudySync</a>

            <div>
                <a class="btn btn-outline-light me-2" href="/rooms/">Rooms</a>
                <a class="btn btn-outline-light me-2" href="/create-room/">Create</a>

                {% if request.user.is_authenticated %}
                    <span class="text-white me-2">👤 {{ request.user.username }}</span>

                    <form action="/logout/" method="POST" style="display:inline;">
                        {% csrf_token %}
                        <button class="btn btn-danger">Logout</button>
                    </form>
                {% else %}
                    <a class="btn btn-success me-2" href="/login/">Login</a>
                    <a class="btn btn-primary" href="/register/">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- 🔥 CONTENT -->
    <div class="mt-4">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
