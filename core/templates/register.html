{% extends 'base.html' %}

{% block content %}

<div style="max-width: 400px; margin: auto;">

    <h2 class="mb-3 text-center">Register</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.as_p }}
        </div>

        <div class="text-center">
            <button class="btn btn-success">Register</button>
        </div>
    </form>

</div>

{% endblock %}
