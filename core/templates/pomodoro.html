<h2>Pomodoro Timer</h2>

<h1 id="timer">25:00</h1>
<button onclick="startTimer()">Start</button>

<script>
let time = 1500;

function startTimer() {
    setInterval(() => {
        if(time > 0){
            time--;
            let min = Math.floor(time/60);
            let sec = time % 60;
            document.getElementById("timer").innerText =
                min + ":" + (sec < 10 ? "0" : "") + sec;
        }
    }, 1000);
}
</script>
