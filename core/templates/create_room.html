{% extends 'base.html' %}

{% block content %}

<div style="max-width: 600px; margin: auto;">

    <!-- 🔥 CARD -->
    <div style="
        border-radius: 15px;
        padding: 30px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    ">

        <h2 class="text-center mb-4">Create Room</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- TITLE -->
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter room title">
            </div>

            <!-- SUBJECT -->
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" placeholder="Enter subject">
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Write something..."></textarea>
            </div>

            <!-- BUTTON -->
            <div class="text-center mt-4">
                <button class="btn btn-light px-4">Create</button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
